ci:
  skip: [fmt, clippy, check]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        name: python mypy
        always_run: true
        pass_filenames: false
        args: ["python"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
  - repo: local
    hooks:
      - id: fmt
        types:
          - rust
        name: rust fmt
        language: system
        entry: cargo
        pass_filenames: false
        args:
          - fmt
          - --
          - --config
          - use_try_shorthand=true,imports_granularity=Crate

      - id: clippy
        types:
          - rust
        name: rust clippy
        language: system
        pass_filenames: false
        entry: cargo
        args:
          - clippy
          - -p
          - psqlpy
          - --
          - -W
          - clippy::all
          - -W
          - clippy::pedantic
          - -D
          - warnings

      - id: check
        types:
          - rust
        name: rust cargo check
        language: system
        entry: cargo
        pass_filenames: false
        args:
          - check
